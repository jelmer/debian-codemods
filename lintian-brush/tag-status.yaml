# This file documents the status of lintian-brush vs tags supported by lintian.
# Supported fields are:
# * tag: name of the tag in lintian
# * status: the status of the tag in lintian-brush, one of:
#   - classification: tag is a classification
#   - implemented: fixer for tag is implemented
#   - not-implemented: fixer for tag is not implemented
#   - build-stage: the tag applies to the way the package is built,
#       not something that can be changed in the source
# * comment: a free-form comment
# * difficulty: an indication of the difficulty of implementing *some* fix for
#               the tag:
#    - easy
#    - medium
#    - hard
#    - impossible
# * detector: whether a detector for the tag is implemented (true/false)
